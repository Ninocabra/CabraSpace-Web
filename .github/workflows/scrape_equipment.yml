name: Scrape Astrophotography Equipment

on:
  schedule:
    # Run every 3 hours
    - cron: '0 */3 * * *'
  workflow_dispatch:
    # Allow manual triggering from GitHub UI

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Run Scraper
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python tools/scraper_equipment.py

    - name: Commit and push changes if updated
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Check if there are changes to equipamiento.json
        if git status --porcelain | grep -q "equipamiento.json"; then
          echo "Changes detected in equipamiento.json. Committing..."
          git add equipamiento.json
          git commit -m "Auto-update: Aggregated latest Astrophotography Equipment updates [skip ci]"
          git pull --rebase origin main
          git push origin main
        else
          echo "No changes in equipamiento.json. Skipping commit."
        fi

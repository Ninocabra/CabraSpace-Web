name: Actualización del Buscador de Coffee Break

on:
  schedule:
    # Ejecutar todos los viernes por la mañana (06:15 UTC -> 07:15/08:15 CET/CEST)
    - cron: '15 6 * * 5'
  workflow_dispatch:
    # Permite ejecutarlo manualmente si es necesario

jobs:
  update-fragments:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Ejecutar actualizador de fragmentos de Coffee Break
        run: python tools/scraper_coffeebreak.py

      - name: Publicar cambios si hay nuevos fragmentos
        run: |
          git config user.name "CabraSpace Bot"
          git config user.email "ninocabra@gmail.com"
          git add fragments_data.json fetched_queries_db.json
          git diff --staged --quiet || git commit -m "🤖 Actualización automática del buscador de Coffee Break [$(date +'%Y-%m-%d %H:%M')]"
          git push

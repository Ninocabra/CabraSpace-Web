name: Scraper de Noticias y Equipamiento

on:
  push:
    branches:
      - main
  schedule:
    # Ejecutar cada 3 horas (en el minuto 15 para evitar picos de carga)
    - cron: '15 */3 * * *'
  workflow_dispatch:
    # Permite lanzarlo manualmente desde GitHub si hace falta

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Necesario para hacer git push

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ejecutar scraper de novedades PixInsight
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python tools/scraper.py

      - name: Ejecutar scraper de equipamiento
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python tools/scraper_equipment.py

      - name: Generar dashboard ligero (latest.json)
        run: python tools/build_latest.py

      - name: Publicar cambios si hay novedades
        run: |
          git config user.name "CabraSpace Bot"
          git config user.email "ninocabra@gmail.com"
          git add novedades.json equipamiento.json catalogo_productos.md latest.json
          git diff --staged --quiet || git commit -m "🤖 Actualización automática de noticias [$(date +'%Y-%m-%d %H:%M')]"
          git push
